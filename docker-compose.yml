version: "3.9"

services:
  # ── Python Agent Mesh (Discord Bridge + FastAPI + WebSocket) ──
  agent-mesh:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-mesh
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      # Mount workspace so agents can read/write project files
      - .:/workspace:rw
    networks:
      - ai-dev-net

  # ── React Command Center (Vite → Nginx → port 3000) ───────────
  command-center:
    build:
      context: ./command-center
      dockerfile: Dockerfile
    container_name: command-center
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - agent-mesh
    extra_hosts:
      # Allow Nginx to reach the Python backend on the host
      - "host.docker.internal:host-gateway"
    networks:
      - ai-dev-net

networks:
  ai-dev-net:
    driver: bridge
